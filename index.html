<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cekih Engine</title>
    <!-- Link Manifest buat bikin jadi APK/Offline -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: white; }
    </style>
</head>
<body>

    <!-- Header Logo -->
    <header class="p-4 flex items-center gap-3">
        <!-- Pastikan ada file bernama logo.png di GitHub kamu -->
        <img src="logo.png" alt="Logo" class="w-10 h-10 rounded-lg">
        <h1 class="text-xl font-bold text-yellow-500">Cekih Engine</h1>
    </header>

    <!-- Tempat aplikasi kamu akan berjalan -->
    <main id="app" class="p-4">
        <!-- Nanti app.js bakal otomatis ngisi konten di sini -->
    </main>

    <!-- Script Utama -->
    <script src="app.js"></script>

    <!-- Script Pendaftaran Service Worker biar bisa offline -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker terdaftar, aplikasi siap offline!'))
            .catch(err => console.log('Gagal daftar:', err));
        }
    </script>
</body>
</html>

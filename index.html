<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cekih Engine - Sadewa Corp</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- html2canvas untuk Screenshot -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        .logo-animasi { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .logo-menang { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fire-effect { animation: burn 0.5s ease-in-out infinite alternate; border-color: #ef4444 !important; box-shadow: 0 0 15px #ef4444; }
        @keyframes burn { from { background-color: rgba(30, 41, 59, 0.4); } to { background-color: rgba(220, 38, 38, 0.2); } }
        .falling-star { position: fixed; top: -20px; font-size: 24px; pointer-events: none; z-index: 9999; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
        .floating-emoji { position: fixed; bottom: -50px; font-size: 40px; pointer-events: none; z-index: 9999; animation: floatUp 2s ease-out forwards; }
        @keyframes floatUp { to { transform: translateY(-105vh); opacity: 0; } }
    </style>
</head>
<body id="mainBody" class="bg-slate-900 text-slate-100 min-h-screen font-sans transition-colors duration-300">

    <!-- TOP BAR / HEADER -->
    <header class="bg-slate-800/50 border-b border-slate-700/50 p-4 sticky top-0 backdrop-blur z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <!-- FIX LOGO: Diarahkan langsung ke logo.png di folder utama -->
                <img id="appLogo" src="logo.png" alt="Sadewa Logo" class="w-10 h-10 object-contain logo-animasi rounded-lg bg-slate-700/30 p-1">
                <div>
                    <h1 id="appTitleText" class="text-xl font-black tracking-wider text-yellow-500">Cekih Engine</h1>
                    <p class="text-[10px] font-mono tracking-widest text-slate-400 uppercase">score cekih by sadewa corp.</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="toggleFullscreen()" class="bg-slate-700/60 hover:bg-slate-700 text-xs px-2.5 py-1.5 rounded-lg border border-slate-600 transition">🖥️ Fullscreen</button>
                <button onclick="openCustomizer()" class="bg-slate-700/60 hover:bg-slate-700 text-xs px-2.5 py-1.5 rounded-lg border border-slate-600 transition">🎨 Warna</button>
                <button id="btnTheme" onclick="toggleDarkMode()" class="bg-slate-700/60 hover:bg-slate-700 text-xs px-2.5 py-1.5 rounded-lg border border-slate-600 transition">🌙 Gelap</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pb-24">
        
        <!-- SCREEN 1: SETUP AWAL -->
        <section id="setupScreen" class="bg-slate-800/40 border border-slate-700/60 rounded-2xl p-6 shadow-xl max-w-md mx-auto mt-10">
            <h2 class="text-lg font-bold text-yellow-500 mb-4 flex items-center gap-2">⚙️ Atur Susunan Ronda</h2>
            <div class="space-y-3">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Nama Pemain 1</label>
                    <input type="text" id="setupA" value="Bapak Mukidi" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-3 py-2 text-white font-medium focus:border-yellow-500 outline-none">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Nama Pemain 2</label>
                    <input type="text" id="setupB" value="Bapak Joko" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-3 py-2 text-white font-medium focus:border-yellow-500 outline-none">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Nama Pemain 3</label>
                    <input type="text" id="setupC" value="Kang Asep" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-3 py-2 text-white font-medium focus:border-yellow-500 outline-none">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Nama Pemain 4</label>
                    <input type="text" id="setupD" value="Kang Cecep" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-3 py-2 text-white font-medium focus:border-yellow-500 outline-none">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">Target Poin Kemenangan</label>
                    <input type="number" id="setupTarget" value="1000" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-3 py-2 text-white font-bold focus:border-yellow-500 outline-none">
                </div>
                <button onclick="mulaiPermainan()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-yellow-600/20 transition mt-4 cursor-pointer">🚀 MULAI RONDA GAME</button>
            </div>
        </section>

        <!-- SCREEN 2: GAMEPLAY (LIVE) -->
        <section id="gameplayScreen" class="hidden space-y-6">
            
            <!-- Pengaturan Live & Tombol Aksi -->
            <div class="bg-slate-800/30 border border-slate-700/50 p-4 rounded-xl flex flex-wrap items-center justify-between gap-3">
                <div class="flex items-center space-x-2">
                    <span class="text-sm text-slate-400 font-medium">Target:</span>
                    <input type="number" id="liveTarget" onchange="ubahTargetLive()" class="w-20 bg-slate-900 border border-slate-600 text-center font-black text-yellow-500 rounded py-1">
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="eksekusiUndo()" class="bg-amber-600/20 hover:bg-amber-600 text-amber-400 hover:text-white border border-amber-600/30 text-xs px-3 py-1.5 rounded-lg transition font-bold">↩️ Undo Ronde</button>
                    <button onclick="pemicuResetTotal()" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white border border-red-600/30 text-xs px-3 py-1.5 rounded-lg transition font-bold">⚠️ Reset Total</button>
                </div>
            </div>

            <!-- AREA CAPTURE SCREENSHOT -->
            <div id="captureArea" class="space-y-6 p-1">
                
                <!-- Judul Bagian Papan Skor -->
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-bold text-slate-200 flex items-center gap-2">📋 Papan Skor Live</h3>
                    <button onclick="ambilScreenshot()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1.5 shadow-md shadow-emerald-600/20 transition">📸 Share/Screenshot</button>
                </div>

                <!-- CONTAINER PAPAN SKOR CARD (DI-RENDER VIA JS) -->
                <div id="papanSkorContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                <!-- TOMBOL INPUT POIN UTAMA -->
                <div class="pt-2">
                    <button id="btnNext" onclick="prosesRondeBerikutnya()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-slate-900 font-black text-lg py-4 rounded-xl shadow-xl shadow-yellow-600/10 transition tracking-wide cursor-pointer">🃏 HITUNG DAN UPDATE SKOR RONDE INI</button>
                </div>

                <!-- BAGIAN TABS BAWAH (GRAFIK, RIWAYAT, STATS, LOGS) -->
                <div class="bg-slate-800/30 border border-slate-700/50 rounded-2xl overflow-hidden mt-4">
                    <div class="flex border-b border-slate-700/50 bg-slate-800/50 text-xs font-bold">
                        <button id="btn-tab-grafik" onclick="switchTab('tab-grafik')" class="flex-1 py-3 text-center tab-btn text-yellow-500 border-b-2 border-yellow-500">📈 Grafik</button>
                        <button id="btn-tab-riwayat" onclick="switchTab('tab-riwayat')" class="flex-1 py-3 text-center tab-btn text-slate-400">📜 Riwayat</button>
                        <button id="btn-tab-statistik" onclick="switchTab('tab-statistik')" class="flex-1 py-3 text-center tab-btn text-slate-400">📊 Statistik</button>
                        <button id="btn-tab-log" onclick="switchTab('tab-log')" class="flex-1 py-3 text-center tab-btn text-slate-400">⚡ Logs AI</button>
                    </div>

                    <div class="p-4 min-h-[220px]">
                        <!-- Tab Grafik -->
                        <div id="tab-grafik" class="tab-content h-52">
                            <canvas id="remiChart"></canvas>
                        </div>
                        <!-- Tab Riwayat Tabel -->
                        <div id="tab-riwayat" class="tab-content hidden overflow-x-auto">
                            <table class="w-full text-left text-xs font-mono">
                                <thead>
                                    <tr class="text-slate-400 border-b border-slate-700">
                                        <th class="py-2">Ronde</th>
                                        <th id="thA" class="py-2">-</th>
                                        <th id="thB" class="py-2">-</th>
                                        <th id="thC" class="py-2">-</th>
                                        <th id="thD" class="py-2">-</th>
                                    </tr>
                                </thead>
                                <tbody id="historyTableBody" class="text-slate-200"></tbody>
                            </table>
                        </div>
                        <!-- Tab Statistik Tambahan -->
                        <div id="tab-statistik" class="tab-content hidden grid grid-cols-2 sm:grid-cols-4 gap-3">
                            <div id="statsContainer" class="contents"></div>
                        </div>
                        <!-- Tab Realtime Logs -->
                        <div id="tab-log" class="tab-content hidden space-y-1 max-h-48 overflow-y-auto font-mono text-[11px] text-slate-400"></div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- MODAL CUSTOMIZER WARNA -->
    <div id="customizerModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[999] flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-5 w-full max-w-xs space-y-4 shadow-2xl">
            <h3 class="font-bold text-sm text-yellow-400 flex items-center gap-1.5">🎨 Kustom Tema Sadewa</h3>
            <div class="space-y-3 text-xs">
                <div class="flex justify-between items-center">
                    <span class="text-slate-300">Warna Background</span>
                    <input type="color" id="cfgBg" value="#0f172a" class="w-8 h-8 rounded border-0 cursor-pointer">
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-300">Warna Tombol Utama</span>
                    <input type="color" id="cfgBtn" value="#ca8a04" class="w-8 h-8 rounded border-0 cursor-pointer">
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-300">Warna Teks Judul</span>
                    <input type="color" id="cfgText" value="#eab308" class="w-8 h-8 rounded border-0 cursor-pointer">
                </div>
            </div>
            <div class="flex space-x-2 pt-2 text-xs">
                <button onclick="tutupCustomizer()" class="flex-1 bg-slate-700 text-slate-200 py-2 rounded-lg font-bold">Batal</button>
                <button onclick="simpanCustomWarna()" class="flex-1 bg-yellow-600 text-slate-900 py-2 rounded-lg font-black">Terapkan</button>
            </div>
        </div>
    </div>

    <!-- Script Kodingan Utama Aplikasi -->
    <script src="app.js"></script>
</body>
</html>
